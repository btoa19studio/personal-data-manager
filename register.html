<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Personal Data Manager</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>📝 Daftar Akun</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Nama Lengkap</label>
                    <input type="text" id="name" placeholder="Masukkan nama" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Masukkan email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Minimal 8 karakter" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Daftar</button>
            </form>
            <p class="auth-link">Sudah punya akun? <a href="login.html">Login</a></p>
            <div id="message" class="message"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0/dist/umd/appwrite.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
